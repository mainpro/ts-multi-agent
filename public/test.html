<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多智能体协作系统</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-light: #dbeafe;
      --bg: #fafafa;
      --bg-white: #ffffff;
      --text: #1f2937;
      --text-sec: #6b7280;
      --text-light: #9ca3af;
      --border: #e5e7eb;
      --success: #10b981;
      --error: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Noto Sans SC', -apple-system, sans-serif; background: var(--bg); color: var(--text); }
    .app { display: flex; height: 100vh; }

    .sidebar {
      width: 380px; background: var(--bg-white); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
    }
    .sidebar-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; position: sticky; top: 0;
      background: var(--bg-white); z-index: 10;
    }
    .sidebar-logo {
      width: 36px; height: 36px; background: var(--primary); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; color: white; font-size: 16px;
    }
    .sidebar-title { font-size: 14px; font-weight: 600; }
    .sidebar-sub { font-size: 11px; color: var(--text-light); }
    .steps-container { padding: 12px; }

    .step {
      margin-bottom: 8px; border: 1px solid var(--border); border-radius: 10px;
      background: var(--bg); overflow: hidden; transition: all 0.3s;
    }
    .step.active { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
    .step.done { border-color: var(--success); }
    .step.fail { border-color: var(--error); }
    .step-header {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      background: var(--bg); cursor: pointer; transition: background 0.2s;
    }
    .step-header:hover { background: #e5e7eb; }
    .step-icon {
      width: 22px; height: 22px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 11px;
      background: white; border: 2px solid var(--border); flex-shrink: 0;
    }
    .step.active .step-icon { border-color: var(--primary); background: var(--primary); color: white; animation: pulse 2s infinite; }
    .step.done .step-icon { border-color: var(--success); background: var(--success); color: white; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,0.4)} 50%{box-shadow:0 0 0 6px rgba(37,99,235,0)} }
    .step-title { flex: 1; font-size: 13px; font-weight: 500; }
    .step-detail { font-size: 11px; color: var(--text-sec); margin-left: 34px; padding: 0 12px 8px; }
    .step-log {
      font-family: monospace; font-size: 11px; background: #f8fafc;
      padding: 8px 12px; margin: 0 12px 8px; border-radius: 6px;
      color: var(--text-sec); max-height: 100px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-word; display: none;
    }
.step-log.visible { display: block; }

.image-upload {
  display: flex;
  align-items: center;
}
.image-btn {
  width: 36px;
  height: 36px;
  border: none;
  background: var(--bg);
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-sec);
  transition: all 0.2s;
  margin-right: 8px;
}
.image-btn:hover {
  background: var(--primary-light);
  color: var(--primary);
}
.image-preview {
  display: flex;
  align-items: center;
  padding: 8px;
  background: var(--bg);
  border-radius: 8px;
  margin-top: 8px;
}
.image-preview img {
  max-width: 120px;
  max-height: 80px;
  border-radius: 6px;
  object-fit: cover;
}
.remove-btn {
  margin-left: 8px;
  width: 24px;
  height: 24px;
  border: none;
  background: #ef4444;
  color: white;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.main { flex: 1; display: flex; flex-direction: column; }
    .chat-header {
      padding: 14px 24px; background: var(--bg-white); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .chat-title { font-size: 15px; font-weight: 600; }
    .chat-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-sec); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    .welcome-icon { width: 64px; height: 64px; background: var(--primary); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 16px; }
    .welcome h1 { font-size: 24px; margin-bottom: 8px; }
    .welcome p { color: var(--text-sec); margin-bottom: 24px; }
    .chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 500px; }
    .chip {
      padding: 8px 14px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 16px; font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .chip:hover { background: var(--primary); color: white; border-color: var(--primary); }

    .msg { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
    }
    .msg.user .msg-avatar { background: var(--primary); color: white; }
    .msg.ai .msg-avatar { background: var(--bg); border: 1px solid var(--border); }
    .msg-bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
    .msg.user .msg-bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
.msg.ai .msg-bubble { background: var(--bg-white); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg-image { margin-bottom: 8px; }
.msg-image img { max-width: 200px; max-height: 150px; border-radius: 8px; }
.msg-time { font-size: 11px; color: var(--text-light); padding: 2px 4px; }

    .thinking-msg { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.3s; }
    .thinking-bubble {
      flex: 1; background: var(--bg-white); border: 1px solid var(--border);
      border-radius: 16px; border-bottom-left-radius: 4px; overflow: hidden;
    }
    .thinking-header {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      background: var(--primary-light); cursor: pointer;
    }
    .thinking-header-text { flex: 1; font-size: 12px; font-weight: 500; color: var(--primary); }
    .thinking-header-agent {
      font-size: 10px; color: var(--text-light); background: rgba(37,99,235,0.1);
      padding: 1px 6px; border-radius: 8px;
    }
    .thinking-body {
      max-height: 0; overflow-y: auto; transition: max-height 0.3s;
      font-size: 13px; line-height: 1.6; color: var(--text-sec);
      white-space: pre-wrap; padding: 0 12px; font-family: monospace;
    }
    .thinking-bubble.open .thinking-body { max-height: 400px; padding: 10px 12px; }
    .thinking-time { font-size: 10px; color: var(--text-light); padding: 4px 12px 6px; text-align: right; border-top: 1px solid var(--border); }

    .result-card {
      background: var(--bg-white); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px; margin-top: 4px;
    }
    .result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .result-icon { width: 22px; height: 22px; background: var(--success); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; }
    .result-title { font-size: 13px; font-weight: 600; }
    .result-body { font-size: 14px; color: var(--text-sec); line-height: 1.6; }
    .result-table-wrapper { overflow-x: auto; margin-top: 8px; }
    .result-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .result-table th { text-align: left; padding: 8px; background: var(--bg); border-bottom: 1px solid var(--border); font-weight: 600; color: var(--text-sec); }
    .result-table td { padding: 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .result-table tr:last-child td { border-bottom: none; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; }
    .status-badge.completed { background: #d1fae5; color: #065f46; }
    .status-badge.pending { background: #fef3c7; color: #92400e; }
    .status-badge.failed { background: #fee2e2; color: #991b1b; }

    .input-bar { padding: 16px 20px; background: var(--bg-white); border-top: 1px solid var(--border); }
    .input-row { max-width: 700px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
    .input-wrap {
      flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 20px;
      padding: 10px 14px; display: flex; align-items: flex-end; transition: all 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
    .input-field {
      flex: 1; border: none; background: transparent; font-size: 14px; outline: none;
      resize: none; min-height: 20px; max-height: 100px; font-family: inherit;
    }
    .input-field::placeholder { color: var(--text-light); }
    .send-btn {
      width: 36px; height: 36px; background: var(--primary); border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
    }
    .send-btn:disabled { background: var(--text-light); cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; fill: white; }
    .input-hint { text-align: center; font-size: 11px; color: var(--text-light); margin-top: 6px; }

    .error-box { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 10px 14px; border-radius: 10px; font-size: 13px; }

    @media(max-width:768px) {
      .sidebar { display: none; }
      .msg, .thinking-msg { max-width: 95%; }
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">AI</div>
      <div>
        <div class="sidebar-title">多智能体系统</div>
        <div class="sidebar-sub">实时处理监控</div>
      </div>
    </div>
    <div class="steps-container" id="stepsContainer"></div>
  </aside>
  <main class="main">
    <header class="chat-header">
      <span class="chat-title">AI 助手</span>
      <div class="chat-status"><span class="status-dot"></span><span>在线</span></div>
    </header>
    <div class="messages" id="chatMessages">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">🤖</div>
        <h1>多智能体协作系统</h1>
        <p>输入需求，智能体自动分析并协调执行</p>
<div class="chips">
  <div class="chip" onclick="setInput('我要申请GEAM凭证查询权限')">申请GEAM权限</div>
  <div class="chip" onclick="setInput('报销发票上传失败了')">报销发票上传失败</div>
  <div class="chip" onclick="setInput('怎么请假')">请假流程</div>
  <div class="chip" onclick="setInput('我要出差')">出差申请</div>
</div>
      </div>
    </div>
<div class="input-bar">
<div class="input-row">
<div class="input-wrap">
<textarea class="input-field" id="msgInput" placeholder="输入需求..." rows="1"
  onkeydown="onKey(event)" oninput="autoSize(this)"></textarea>
</div>
<div class="image-upload">
  <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
  <button class="image-btn" onclick="document.getElementById('imageInput').click()" title="上传图片">
    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 7v2.99s-1.99.01-2 0V7h-3s.01-2 0-2h3V2h2v3h3v2h-3zm-4 7.5c0 1.93-1.57 3.5-3.5 3.5S8 16.43 8 14.5 9.57 11 11.5 11s3.5 1.57 3.5 3.5zm4.5 4.5c0 .83-.67 1.5-1.5 1.5H4c-.83 0-1.5-.67-1.5-1.5v-9c0-.83.67-1.5 1.5-1.5h3.5l2-3h5l2 3H20c.83 0 1.5.67 1.5 1.5v9z"/></svg>
  </button>
</div>
<button class="send-btn" id="sendBtn" onclick="send()">
  <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
</button>
</div>
<div class="image-preview" id="imagePreview" style="display:none">
<img id="previewImg" src="" alt="预览">
<button class="remove-btn" onclick="clearImage()">×</button>
</div>
<div class="input-hint">Enter 发送 · Shift+Enter 换行</div>
</div>
  </main>
</div>
<script>
const API = window.location.origin;
let busy = false;
const thinkingBubbles = {};
let selectedImage = null;

const STEPS = [
{ id: 'intent', icon: '🧠', title: '意图分类' },
{ id: 'plan', icon: '📋', title: '任务规划' },
{ id: 'exec', icon: '⚡', title: '任务执行' },
{ id: 'result', icon: '✅', title: '生成结果' },
];

function initSteps() {
  document.getElementById('stepsContainer').innerHTML = STEPS.map(s =>
    `<div class="step" id="step-${s.id}">
      <div class="step-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="step-icon">${s.icon}</div>
        <div class="step-title">${s.title}</div>
      </div>
      <div class="step-detail" id="detail-${s.id}"></div>
      <div class="step-log" id="log-${s.id}"></div>
    </div>`
  ).join('');
}

function setStep(id, status, detail, log) {
  const el = document.getElementById('step-' + id);
  if (!el) return;
  el.classList.remove('active', 'done', 'fail');
  if (status) el.classList.add(status);
  if (status === 'active') el.classList.add('open');
  const d = document.getElementById('detail-' + id);
  if (d && detail) d.textContent = detail;
  const l = document.getElementById('log-' + id);
  if (l && log) { l.textContent += (l.textContent ? '\n' : '') + log; l.classList.add('visible'); l.scrollTop = l.scrollHeight; }
}

function resetSteps() {
  STEPS.forEach(s => {
    const el = document.getElementById('step-' + s.id);
    if (el) { el.classList.remove('active', 'done', 'fail', 'open'); }
    const d = document.getElementById('detail-' + s.id);
    if (d) d.textContent = '';
    const l = document.getElementById('log-' + s.id);
    if (l) { l.textContent = ''; l.classList.remove('visible'); }
  });
}

function addMsg(role, content) {
const c = document.getElementById('chatMessages');
const el = document.createElement('div');
el.className = 'msg ' + role;
const t = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

let bubbleContent = '';
if (typeof content === 'object' && content.image) {
  // 包含图片的消息
  bubbleContent = `<div class="msg-image"><img src="${content.image}" alt="用户图片"></div>`;
  if (content.text) {
    bubbleContent += `<div>${esc(content.text)}</div>`;
  }
} else {
  bubbleContent = esc(content);
}

el.innerHTML = `<div class="msg-avatar">${role === 'user' ? '👤' : '🤖'}</div>
<div><div class="msg-bubble">${bubbleContent}</div><div class="msg-time">${t}</div></div>`;
c.appendChild(el);
c.scrollTop = c.scrollHeight;
}

function addThink(agent) {
  const c = document.getElementById('chatMessages');
  const id = 'think-' + Date.now();
  const el = document.createElement('div');
  el.className = 'thinking-msg';
  el.id = id;
  const label = agent.includes('Sub') ? '子智能体' : '主智能体';
  const t = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  el.innerHTML = `<div class="msg-avatar">${agent.includes('Sub') ? '⚡' : '🧠'}</div>
    <div class="thinking-bubble" id="bubble-${id}">
      <div class="thinking-header" onclick="this.parentElement.classList.toggle('open')">
        <span>💭</span>
        <span class="thinking-header-text">深度思考</span>
        <span class="thinking-header-agent">${label}</span>
        <span>▼</span>
      </div>
      <div class="thinking-body" id="body-${id}"></div>
      <div class="thinking-time">${t}</div>
    </div>`;
  c.appendChild(el);
  c.scrollTop = c.scrollHeight;
  thinkingBubbles[id] = { content: '', el: document.getElementById('body-' + id), bubble: document.getElementById('bubble-' + id) };
  return id;
}

function appendThink(id, text) {
  const b = thinkingBubbles[id];
  if (!b) return;
  b.content += text;
  b.el.textContent = b.content;
  if (!b.bubble.classList.contains('open')) b.bubble.classList.add('open');
  
  // 自动滚动到内容底部
  b.el.scrollTop = b.el.scrollHeight;
  
  // 同时滚动聊天区域到底部
  const chatContainer = document.getElementById('chatMessages');
  if (chatContainer) {
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }
}

function showResult(data) {
  const c = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = 'msg ai';

  const taskResults = data?.results || [];
  
  if (taskResults.length === 0) {
    const text = data?.message || JSON.stringify(data, null, 2);
    el.innerHTML = `<div class="msg-avatar">🤖</div>
      <div><div class="result-card">
        <div class="result-header"><div class="result-icon">✓</div><div class="result-title">处理完成</div></div>
        <div class="result-body">${esc(text)}</div>
      </div></div>`;
  } else {
    let tableRows = '';
    taskResults.forEach((task, idx) => {
      tableRows += `<tr>
        <td>${idx + 1}</td>
        <td>${task.skillName ? esc(task.skillName) : '-'}</td>
        <td>${task.requirement ? esc(task.requirement) : '-'}</td>
        <td>${task.response ? esc(task.response) : '-'}</td>
        <td><span class="status-badge ${task.status || 'completed'}">${task.status || '完成'}</span></td>
      </tr>`;
    });

    el.innerHTML = `<div class="msg-avatar">🤖</div>
      <div><div class="result-card">
        <div class="result-header"><div class="result-icon">✓</div><div class="result-title">处理完成 (${taskResults.length}个任务)</div></div>
        <div class="result-table-wrapper">
          <table class="result-table">
            <thead>
              <tr>
                <th>#</th>
                <th>技能</th>
                <th>任务</th>
                <th>结果</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody>
              ${tableRows}
            </tbody>
          </table>
        </div>
      </div></div>`;
  }
  
  c.appendChild(el);
  c.scrollTop = c.scrollHeight;
}

function showError(msg) {
  const c = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = 'msg ai';
  el.innerHTML = `<div class="msg-avatar">⚠️</div><div><div class="error-box">${esc(msg)}</div></div>`;
  c.appendChild(el);
  c.scrollTop = c.scrollHeight;
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function autoSize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
function setInput(t) { const i = document.getElementById('msgInput'); i.value = t; autoSize(i); i.focus(); }
function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

function handleImageSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    selectedImage = e.target.result;
    document.getElementById('previewImg').src = selectedImage;
    document.getElementById('imagePreview').style.display = 'flex';
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  selectedImage = null;
  document.getElementById('imageInput').value = '';
  document.getElementById('imagePreview').style.display = 'none';
  document.getElementById('previewImg').src = '';
}

function parseSSE(buf) {
  const evts = [];
  buf.split('\n\n').forEach(b => {
    if (!b.trim()) return;
    let type = '', data = '';
    b.split('\n').forEach(l => {
      if (l.startsWith('event:')) type = l.slice(6).trim();
      else if (l.startsWith('data:')) data = l.slice(5).trim();
    });
    if (type && data) {
      try { 
        const parsed = JSON.parse(data);
        console.log('[parseSSE] Parsed:', type, parsed);
        evts.push({ type, data: parsed }); 
      } catch { 
        console.log('[parseSSE] Failed to parse:', type, data);
        evts.push({ type, data }); 
      }
    }
  });
  return evts;
}

function handleEvent(ev) {
  console.log('[handleEvent] Event type:', ev.type, 'Data:', ev.data);
  
  // 显示所有事件到日志
  console.log(`[SSE Event] ${ev.type}:`, JSON.stringify(ev.data).substring(0, 200));
  
  // 按事件类型分类显示
  if (ev.type === 'start') {
    console.log('[System] 开始处理请求');
    return;
  }
  
  if (ev.type === 'reasoning') {
    let content = '';
    let agent = 'MainAgent';
    
    if (typeof ev.data === 'string') {
      try {
        const parsed = JSON.parse(ev.data);
        content = parsed.content || '';
        agent = parsed.agent || 'MainAgent';
      } catch (e) {
        content = ev.data;
      }
    } else if (ev.data && typeof ev.data === 'object') {
      content = ev.data.content || ev.data.message || '';
      agent = ev.data.agent || 'MainAgent';
    }
    
    const agentLabel = getAgentLabel(agent);
    console.log(`[${agentLabel}] 推理中: ${content.substring(0, 50)}...`);
    
    const key = agent;
    if (!thinkingBubbles['__' + key]) thinkingBubbles['__' + key] = addThink(agent);
    appendThink(thinkingBubbles['__' + key], content);
    return;
  }
  
  if (ev.type === 'reasoning_complete') {
    console.log('[All] 推理完成');
    Object.keys(thinkingBubbles).filter(k => k.startsWith('__')).forEach(k => delete thinkingBubbles[k]);
    return;
  }
  
  if (ev.type === 'step') {
    const msg = ev.data?.message || '';
    const agent = ev.data?.agent || 'System';
    const agentLabel = getAgentLabel(agent);
    const stepNum = ev.data?.step || '?';
    const logMsg = `[${agentLabel}] ${msg}`;
    
    console.log(`[Step ${stepNum}] ${logMsg}`);
    
    // 根据消息内容分配到对应的步骤，并显示日志
    // 意图分类阶段
    if (msg.includes('📥 收到用户请求')) { 
      setStep('intent', 'active', '开始分析', logMsg); 
    }
    else if (msg.includes('🖼️ 检测到图片') || msg.includes('🖼️ 图片分析')) { 
      setStep('intent', 'active', '图片分析', logMsg); 
    }
    else if (msg.includes('🔄 正在分类') || msg.includes('🤖 使用 LLM')) { 
      setStep('intent', 'active', '识别意图', logMsg); 
    }
    else if (msg.includes('⚡ 快速匹配')) { 
      setStep('intent', 'active', '快速匹配', logMsg); 
    }
    else if (msg.includes('📊 意图分类') || msg.includes('📊 任务分析')) { 
      setStep('intent', 'done', '完成', logMsg); 
      setStep('plan', 'active', '开始规划', logMsg);
    }
    else if (msg.includes('✅ LLM 返回任务')) { 
      setStep('intent', 'done', '完成', logMsg); 
      setStep('plan', 'active', '开始规划', logMsg);
    }
    
    // 规划阶段  
    else if (msg.includes('⚠️ 检测到转人工')) { 
      setStep('plan', 'active', '检测转人工', logMsg); 
    }
    else if (msg.includes('📝 SessionContext')) { 
      setStep('plan', 'active', '更新上下文', logMsg); 
    }
    else if (msg.includes('📋')) { 
      setStep('plan', 'active', '规划中', logMsg); 
    }
    else if (msg.includes('✅ 规划完成')) { 
      setStep('plan', 'done', '完成', logMsg); 
      setStep('exec', 'active', '开始执行', logMsg);
    }
    else if (msg.includes('⚠️ 规划失败')) { 
      setStep('plan', 'fail', '规划失败', logMsg); 
    }
    
    // 执行阶段
    else if (msg.includes('📤 向任务队列提交')) { 
      setStep('exec', 'active', '提交任务', logMsg); 
    }
    else if (msg.includes('📥 执行技能') || msg.includes('🔄 开始执行任务')) { 
      setStep('exec', 'active', '执行中', logMsg); 
    }
    else if (msg.includes('📚 需要参考资料')) { 
      setStep('exec', 'active', '读取资料', logMsg); 
    }
    else if (msg.includes('✅ executor 返回成功') || msg.includes('✅ 任务执行')) { 
      setStep('exec', 'done', '执行完成', logMsg); 
      setStep('result', 'active', '生成结果', logMsg);
    }
    
    // 结果阶段
    else if (msg.includes('✅ 所有任务执行完成')) { 
      setStep('exec', 'done', '完成', logMsg); 
      setStep('result', 'done', '成功', logMsg); 
    }
    
    // 错误处理
    else if (msg.includes('⚠️')) { 
      if (stepNum <= 7) setStep('intent', 'fail', '失败', logMsg);
      else if (stepNum <= 10) setStep('plan', 'fail', '失败', logMsg);
      else setStep('exec', 'fail', '失败', logMsg);
    }
    
    // 其他情况，显示到当前活跃的步骤
    else {
      const activeStep = document.querySelector('.step.active');
      if (activeStep) {
        const id = activeStep.id.replace('step-', '');
        setStep(id, 'active', '处理中', logMsg);
      }
    }
  }
}

function getAgentLabel(agent) {
  if (agent.includes('Sub')) return 'SubAgent';
  if (agent.includes('Main')) return 'MainAgent';
  if (agent.includes('Vision')) return 'VisionLLM';
  if (agent.includes('Intent')) return 'IntentRouter';
  if (agent.includes('Unified')) return 'UnifiedPlanner';
  return 'System';
}

async function send() {
const input = document.getElementById('msgInput');
const btn = document.getElementById('sendBtn');
const text = input.value.trim();
if ((!text && !selectedImage) || busy) return;

document.getElementById('welcomeScreen')?.remove();

// 显示用户消息（包含图片）
const userContent = selectedImage 
  ? { text: text || '请分析这张图片', image: selectedImage }
  : text;
addMsg('user', userContent);

const requestBody = { requirement: text || '请分析这张图片' };
if (selectedImage && selectedImage.length > 100) {
  requestBody.image = selectedImage;
}

input.value = ''; input.style.height = 'auto';
clearImage();
busy = true; btn.disabled = true; input.disabled = true;
resetSteps();

const thinkId = addThink('MainAgent');
let thinkingActive = true;

try {
const res = await fetch(API + '/tasks/stream', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
  body: JSON.stringify(requestBody)
});
    if (!res.ok) throw new Error('HTTP ' + res.status);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '', finalResult = null, hasError = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const evts = parseSSE(buf);
      const last = buf.lastIndexOf('\n\n');
      if (last !== -1) buf = buf.slice(last + 2);
      for (const ev of evts) {
        console.log('[Raw Event]', ev.type, ev.data);
        
        if (ev.type === 'complete') {
          console.log('[System] 任务完成:', JSON.stringify(ev.data).substring(0, 100));
          finalResult = ev.data;
        }
        else if (ev.type === 'error') { 
          hasError = true; 
          console.log('[Error] 错误:', JSON.stringify(ev.data));
          showError(ev.data.message || JSON.stringify(ev.data)); 
        }
        else handleEvent(ev);
      }
    }

    if (thinkingActive) {
      const el = document.getElementById(thinkId);
      if (el) el.remove();
    }
    setStep('result', 'done', '完成');
    if (!hasError) {
      if (finalResult?.message) addMsg('ai', finalResult.message);
      else if (finalResult) showResult(finalResult);
      else addMsg('ai', '处理完成');
    }
  } catch (err) {
    showError('请求失败: ' + err.message);
  } finally {
    busy = false; btn.disabled = false; input.disabled = false; input.focus();
  }
}

document.addEventListener('DOMContentLoaded', initSteps);
</script>
</body>
