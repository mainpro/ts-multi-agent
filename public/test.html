<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多智能体协作系统 - AI助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-primary: #fafafa;
      --bg-secondary: #f3f4f6;
      --bg-message-user: #2563eb;
      --bg-message-ai: #ffffff;
      --bg-sidebar: #ffffff;
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --text-light: #9ca3af;
      --border-color: #e5e7eb;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --transition: all 0.2s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
    }

    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 380px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      background: var(--bg-sidebar);
      z-index: 10;
    }

    .sidebar-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary-color), #3b82f6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 18px;
    }

    .sidebar-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .sidebar-subtitle {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 2px;
    }

    .thinking-container {
      padding: 16px;
    }

    .thinking-section {
      margin-bottom: 16px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      overflow: hidden;
    }

    .thinking-section.active {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .thinking-section.completed {
      border-color: #10b981;
    }

    .thinking-section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--bg-secondary);
      cursor: pointer;
      transition: var(--transition);
    }

    .thinking-section-header:hover {
      background: #e5e7eb;
    }

    .thinking-section-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      background: white;
      border: 2px solid var(--border-color);
      flex-shrink: 0;
    }

    .thinking-section.active .thinking-section-icon {
      border-color: var(--primary-color);
      background: var(--primary-color);
      color: white;
      animation: pulse 2s infinite;
    }

    .thinking-section.completed .thinking-section-icon {
      border-color: #10b981;
      background: #10b981;
      color: white;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
      50% { box-shadow: 0 0 0 6px rgba(37, 99, 235, 0); }
    }

    .thinking-section-title {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .thinking-section-expand {
      font-size: 12px;
      color: var(--text-light);
      transition: transform 0.3s ease;
    }

    .thinking-section.expanded .thinking-section-expand {
      transform: rotate(180deg);
    }

    .thinking-section-content {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .thinking-section.expanded .thinking-section-content {
      max-height: 500px;
      opacity: 1;
    }

    .thinking-details {
      padding: 12px 14px;
      border-top: 1px solid var(--border-color);
    }

    .thinking-detail-item {
      margin-bottom: 10px;
      font-size: 13px;
    }

    .thinking-detail-item:last-child {
      margin-bottom: 0;
    }

    .thinking-detail-label {
      color: var(--text-light);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .thinking-detail-value {
      color: var(--text-primary);
      line-height: 1.5;
    }

    .thinking-log {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 12px;
      background: #f8fafc;
      padding: 10px;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      max-height: 150px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .subtask-list {
      margin-top: 8px;
    }

    .subtask-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: white;
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
      font-size: 12px;
      border-left: 3px solid var(--border-color);
    }

    .subtask-item.pending {
      border-left-color: var(--text-light);
    }

    .subtask-item.running {
      border-left-color: var(--primary-color);
      background: rgba(37, 99, 235, 0.05);
    }

    .subtask-item.completed {
      border-left-color: #10b981;
      background: rgba(16, 185, 129, 0.05);
    }

    .subtask-item.failed {
      border-left-color: #ef4444;
      background: rgba(239, 68, 68, 0.05);
    }

    .subtask-icon {
      font-size: 14px;
    }

    .subtask-name {
      flex: 1;
      color: var(--text-secondary);
    }

    .subtask-status {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg-secondary);
      color: var(--text-light);
    }

    .subtask-item.running .subtask-status {
      background: rgba(37, 99, 235, 0.1);
      color: var(--primary-color);
    }

    .subtask-item.completed .subtask-status {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
    }

    .subtask-item.failed .subtask-status {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .chat-header {
      padding: 16px 24px;
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .chat-header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .welcome-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .welcome-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary-color), #3b82f6);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-lg);
    }

    .welcome-title {
      font-size: 28px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .welcome-subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: 600px;
    }

    .suggestion-chip {
      padding: 10px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
    }

    .suggestion-chip:hover {
      background: var(--bg-message-user);
      color: white;
      border-color: var(--bg-message-user);
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: messageIn 0.3s ease;
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.user .message-avatar {
      background: var(--bg-message-user);
      color: white;
    }

    .message.ai .message-avatar {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
    }

    .message-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message-bubble {
      padding: 14px 18px;
      border-radius: var(--radius-lg);
      font-size: 15px;
      line-height: 1.6;
      max-width: 100%;
      word-wrap: break-word;
    }

    .message.user .message-bubble {
      background: var(--bg-message-user);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.ai .message-bubble {
      background: var(--bg-message-ai);
      border: 1px solid var(--border-color);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
    }

    .message-time {
      font-size: 12px;
      color: var(--text-light);
      padding: 0 4px;
    }

    .message.user .message-time {
      text-align: right;
    }

    .thinking-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--bg-message-ai);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
      animation: messageIn 0.3s ease;
    }

    .thinking-dots {
      display: flex;
      gap: 4px;
    }

    .thinking-dot {
      width: 8px;
      height: 8px;
      background: var(--primary-color);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .thinking-dot:nth-child(1) { animation-delay: -0.32s; }
    .thinking-dot:nth-child(2) { animation-delay: -0.16s; }
    .thinking-dot:nth-child(3) { animation-delay: 0s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .thinking-text {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Deep Thinking Message - Doubao style */
    .thinking-message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: messageIn 0.3s ease;
      margin-bottom: 16px;
    }

    .thinking-message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .thinking-bubble {
      flex: 1;
      background: var(--bg-message-ai);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .thinking-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      transition: var(--transition);
    }

    .thinking-header:hover {
      background: linear-gradient(135deg, #e0f2fe, #dbeafe);
    }

    .thinking-header-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .thinking-header-text {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--primary-color);
    }

    .thinking-header-agent {
      font-size: 11px;
      color: var(--text-light);
      background: rgba(37, 99, 235, 0.1);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .thinking-header-expand {
      font-size: 12px;
      color: var(--text-light);
      transition: transform 0.3s ease;
    }

    .thinking-bubble.expanded .thinking-header-expand {
      transform: rotate(180deg);
    }

    .thinking-content {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .thinking-bubble.expanded .thinking-content {
      max-height: 500px;
      opacity: 1;
    }

    .thinking-body {
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Monaco', 'Menlo', monospace;
      background: #fafafa;
    }

    .thinking-loading {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .thinking-loading-dot {
      width: 6px;
      height: 6px;
      background: var(--primary-color);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .thinking-loading-dot:nth-child(1) { animation-delay: -0.32s; }
    .thinking-loading-dot:nth-child(2) { animation-delay: -0.16s; }
    .thinking-loading-dot:nth-child(3) { animation-delay: 0s; }

    .thinking-time {
      font-size: 12px;
      color: var(--text-light);
      padding: 8px 16px;
      text-align: right;
      border-top: 1px solid var(--border-color);
      background: #f8fafc;
    }

    .result-card {
      background: var(--bg-message-ai);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-top: 8px;
      box-shadow: var(--shadow-sm);
    }

    .result-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .result-card-icon {
      width: 24px;
      height: 24px;
      background: #10b981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
    }

    .result-card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .result-card-content {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .input-container {
      padding: 20px 24px;
      background: var(--bg-sidebar);
      border-top: 1px solid var(--border-color);
    }

    .input-wrapper {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-field-container {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: 12px 16px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      transition: var(--transition);
    }

    .input-field-container:focus-within {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .input-field {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 15px;
      color: var(--text-primary);
      outline: none;
      resize: none;
      min-height: 24px;
      max-height: 120px;
      font-family: inherit;
    }

    .input-field::placeholder {
      color: var(--text-light);
    }

    .send-button {
      width: 40px;
      height: 40px;
      background: var(--primary-color);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .send-button:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: scale(1.05);
    }

    .send-button:disabled {
      background: var(--text-light);
      cursor: not-allowed;
    }

    .send-button svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .input-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
      margin-top: 8px;
    }

    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .chat-messages {
        padding: 16px;
      }

      .message {
        max-width: 95%;
      }

      .input-container {
        padding: 12px 16px;
      }
    }

    .error-message {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      margin: 8px 0;
      font-size: 14px;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-light);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">AI</div>
        <div>
          <div class="sidebar-title">多智能体系统</div>
          <div class="sidebar-subtitle">实时处理监控</div>
        </div>
      </div>
      <div class="thinking-container" id="thinkingContainer"></div>
    </aside>

    <main class="main-content">
      <header class="chat-header">
        <div class="chat-header-left">
          <span class="chat-header-title">AI 助手</span>
        </div>
        <div class="chat-header-status">
          <span class="status-dot"></span>
          <span>在线</span>
        </div>
      </header>

      <div class="chat-messages" id="chatMessages">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">🤖</div>
          <h1 class="welcome-title">多智能体协作系统</h1>
          <p class="welcome-subtitle">输入您的需求，我将自动分析并协调多个智能体完成任务</p>
          <div class="suggestion-chips">
            <div class="suggestion-chip" onclick="setInput('计算 2 + 2')">计算 2 + 2</div>
            <div class="suggestion-chip" onclick="setInput('查询班级信息')">查询班级信息</div>
            <div class="suggestion-chip" onclick="setInput('5 乘以 8 等于多少')">5 乘以 8</div>
            <div class="suggestion-chip" onclick="setInput('帮我算一下 100 除以 4')">100 除以 4</div>
          </div>
        </div>
      </div>

      <div class="input-container">
        <div class="input-wrapper">
          <div class="input-field-container">
            <textarea class="input-field" id="messageInput" placeholder="输入您的需求..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
          </div>
          <button class="send-button" id="sendButton" onclick="sendMessage()" title="发送">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <div class="input-hint">按 Enter 发送，Shift + Enter 换行</div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:3000';
    let isProcessing = false;
    let subtasks = {};

    const THINKING_SECTIONS = {
      analysis: { id: 'analysis', title: '需求分析', icon: '🧠', description: '分析用户意图和提取关键实体' },
      matching: { id: 'matching', title: '技能匹配', icon: '⚙️', description: '匹配最适合的技能' },
      planning: { id: 'planning', title: '任务规划', icon: '📋', description: '创建 DAG 任务计划' },
      execution: { id: 'execution', title: '任务执行', icon: '⚡', description: 'SubAgent 执行技能脚本' },
      aggregation: { id: 'aggregation', title: '结果聚合', icon: '🔄', description: '汇总子任务结果' },
      response: { id: 'response', title: '生成响应', icon: '✨', description: '生成最终回复' }

    function toggleSection(sectionId) {
      const section = document.getElementById('section-' + sectionId);
      if (section) section.classList.toggle('expanded');
    }

    function updateSection(sectionId, status, detail, log) {
      const section = document.getElementById('section-' + sectionId);
      if (!section) return;

      section.classList.remove('active', 'completed');
      section.classList.add(status);

      const statusEl = document.getElementById('status-' + sectionId);
      const statusText = { active: '进行中...', completed: '已完成', failed: '失败', waiting: '等待中' }[status] || status;
      if (statusEl) statusEl.textContent = statusText;

      if (log) {
        const logContainer = document.getElementById('log-container-' + sectionId);
        const logEl = document.getElementById('log-' + sectionId);
        if (logContainer && logEl) {
          logContainer.style.display = 'block';
          logEl.textContent += (logEl.textContent ? '\n' : '') + log;
          logEl.scrollTop = logEl.scrollHeight;
        }
      }

      if (detail) {
        const details = document.getElementById('details-' + sectionId);
        const existingDetail = details.querySelector('.dynamic-detail');
        if (existingDetail) existingDetail.remove();
        
        const detailItem = document.createElement('div');
        detailItem.className = 'thinking-detail-item dynamic-detail';
        detailItem.innerHTML = '<div class="thinking-detail-label">详情</div><div class="thinking-detail-value">' + escapeHtml(detail) + '</div>';
        details.insertBefore(detailItem, details.children[1]);
      }

      if (status === 'active') section.classList.add('expanded');
    }

    function addSubtask(sectionId, taskId, name, status) {
      const container = document.getElementById('subtasks-' + sectionId);
      if (!container) return;

      const icons = { pending: '⏳', running: '🔄', completed: '✅', failed: '❌' };
      const existing = document.getElementById('subtask-' + taskId);
      
      if (existing) {
        existing.className = 'subtask-item ' + status;
        const statusEl = existing.querySelector('.subtask-status');
        const iconEl = existing.querySelector('.subtask-icon');
        if (statusEl) statusEl.textContent = status;
        if (iconEl) iconEl.textContent = icons[status];
      } else {
        const subtask = document.createElement('div');
        subtask.className = 'subtask-item ' + status;
        subtask.id = 'subtask-' + taskId;
        subtask.innerHTML = '<span class="subtask-icon">' + icons[status] + '</span><span class="subtask-name">' + escapeHtml(name) + '</span><span class="subtask-status">' + status + '</span>';
        container.appendChild(subtask);
      }
    }

    function resetSections() {
      Object.keys(THINKING_SECTIONS).forEach(id => {
        const section = document.getElementById('section-' + id);
        if (section) {
          section.classList.remove('active', 'completed', 'expanded');
          const statusEl = document.getElementById('status-' + id);
          if (statusEl) statusEl.textContent = '等待中';
          const logContainer = document.getElementById('log-container-' + id);
          if (logContainer) {
            logContainer.style.display = 'none';
            const logEl = document.getElementById('log-' + id);
            if (logEl) logEl.textContent = '';
          }
          const subtasks = document.getElementById('subtasks-' + id);
          if (subtasks) subtasks.innerHTML = '';
          const dynamicDetails = section.querySelectorAll('.dynamic-detail');
          dynamicDetails.forEach(el => el.remove());
        }
      });
      subtasks = {};
    }

function addThinkingBubble(agent, title) {
  const container = document.getElementById('chatMessages');
  const bubbleId = 'thinking-bubble-' + agent + '-' + Date.now();
  
  const thinking = document.createElement('div');
  thinking.className = 'thinking-message ai';
  thinking.id = bubbleId;
  
  const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  
  const avatar = agent === 'MainAgent' ? '🧠' : '⚡';
  const agentLabel = agent === 'MainAgent' ? '主智能体' : '子智能体';
  
  thinking.innerHTML = 
    '<div class="message-avatar">' + avatar + '</div>' +
    '<div class="thinking-bubble" id="bubble-' + bubbleId + '">' +
      '<div class="thinking-header" data-bubble-id="' + bubbleId + '">' +
        '<div class="thinking-header-icon">💭</div>' +
        '<div class="thinking-header-text">深度思考</div>' +
        '<div class="thinking-header-agent">' + agentLabel + '</div>' +
        '<div class="thinking-header-expand">▼</div>' +
      '</div>' +
      '<div class="thinking-content">' +
        '<div class="thinking-body" id="body-' + bubbleId + '">' +
          '<div class="thinking-loading" id="loading-' + bubbleId + '">' +
            '<div class="thinking-loading-dot"></div>' +
            '<div class="thinking-loading-dot"></div>' +
            '<div class="thinking-loading-dot"></div>' +
            '<span>正在思考...</span>' +
          '</div>' +
        '</div>' +
        '<div class="thinking-time">' + time + '</div>' +
      '</div>' +
    '</div>';
  
  // Add event listener for toggle
  const header = thinking.querySelector('.thinking-header');
  if (header) {
    header.addEventListener('click', function() {
      const bid = this.getAttribute('data-bubble-id');
      const bubble = document.getElementById('bubble-' + bid);
      if (bubble) bubble.classList.toggle('expanded');
    });
  }
  
  container.appendChild(thinking);
  container.scrollTop = container.scrollHeight;
  
  currentThinkingMessages[bubbleId] = {
    agent: agent,
    content: '',
    element: thinking
  };
  
  return bubbleId;
}

function toggleThinkingBubble(bubbleId) {
  const bubble = document.getElementById('bubble-' + bubbleId);
  if (bubble) {
    bubble.classList.toggle('expanded');
  }
}

function updateThinkingBubble(bubbleId, reasoning) {
  const bubble = currentThinkingMessages[bubbleId];
  if (!bubble) return;
  
  const loadingEl = document.getElementById('loading-' + bubbleId);
  if (loadingEl) loadingEl.remove();
  
  const bodyEl = document.getElementById('body-' + bubbleId);
  if (bodyEl) {
    bubble.content += reasoning;
    bodyEl.textContent = bubble.content;
  }
  
  // Auto expand to show content
  const bubbleEl = document.getElementById('bubble-' + bubbleId);
  if (bubbleEl && !bubbleEl.classList.contains('expanded')) {
    bubbleEl.classList.add('expanded');
  }
}

function finalizeThinkingBubble(bubbleId) {
  const bubble = currentThinkingMessages[bubbleId];
  if (!bubble) return;
  
  const loadingEl = document.getElementById('loading-' + bubbleId);
  if (loadingEl) loadingEl.remove();
  
  delete currentThinkingMessages[bubbleId];
}

function hideThinking() {
  // Remove the initial thinking indicator
  const thinkingIndicator = document.getElementById('thinkingIndicator');
  if (thinkingIndicator) {
    thinkingIndicator.remove();
  }
  
  // Clean up all active thinking bubbles
  Object.keys(activeThinkingBubbles).forEach(key => {
    finalizeThinkingBubble(activeThinkingBubbles[key]);
  });
  activeThinkingBubbles = {};
  currentThinkingMessages = {};
}

    function showResult(result) {
      const container = document.getElementById('chatMessages');
      const resultCard = document.createElement('div');
      resultCard.className = 'message ai';
      
      // Try to extract a user-friendly message from result
      let displayContent = '';
      if (typeof result === 'object') {
        // Check for common result patterns
        if (result.result !== undefined) {
          displayContent = String(result.result);
        } else if (result.finalResult !== undefined) {
          displayContent = typeof result.finalResult === 'object' ? 
            (result.finalResult.result !== undefined ? String(result.finalResult.result) : JSON.stringify(result.finalResult, null, 2)) :
            String(result.finalResult);
        } else if (result.message) {
          displayContent = result.message;
        } else if (result.steps && Array.isArray(result.steps)) {
          // For step-by-step execution, show the final result
          const lastStep = result.steps[result.steps.length - 1];
          if (lastStep && lastStep.result) {
            displayContent = typeof lastStep.result === 'object' ? 
              JSON.stringify(lastStep.result, null, 2) : String(lastStep.result);
          } else {
            displayContent = JSON.stringify(result, null, 2);
          }
        } else {
          displayContent = JSON.stringify(result, null, 2);
        }
      } else {
        displayContent = String(result);
      }
      
      resultCard.innerHTML = '<div class="message-avatar">🤖</div><div class="message-content"><div class="result-card"><div class="result-card-header"><div class="result-card-icon">✓</div><div class="result-card-title">处理完成</div></div><div class="result-card-content">' + escapeHtml(displayContent) + '</div></div></div>';
      container.appendChild(resultCard);
      container.scrollTop = container.scrollHeight;
    }

    function parseSSEvents(buffer) {
      const events = [];
      const blocks = buffer.split('\n\n');
      for (const block of blocks) {
        if (!block.trim()) continue;
        const lines = block.split('\n');
        let eventType = '';
        let eventData = '';
        for (const line of lines) {
          if (line.startsWith('event:')) eventType = line.slice(6).trim();
          else if (line.startsWith('data:')) eventData = line.slice(5).trim();
        }
        if (eventType && eventData) {
          try { events.push({ type: eventType, data: JSON.parse(eventData) }); }
          catch (e) { events.push({ type: eventType, data: eventData }); }
        }
      }
      return events;
    }

  // Track active thinking bubbles
  let activeThinkingBubbles = {};

  function handleSSEEvent(event) {
    // Handle reasoning events - show in thinking bubble
    if (event.type === 'reasoning' && event.data) {
      const reasoningContent = event.data.content || '';
      const agent = event.data.agent || 'MainAgent';
      
      // Create or get existing thinking bubble for this agent
      const bubbleKey = agent;
      if (!activeThinkingBubbles[bubbleKey]) {
        activeThinkingBubbles[bubbleKey] = addThinkingBubble(agent, '深度思考');
      }
      
      updateThinkingBubble(activeThinkingBubbles[bubbleKey], reasoningContent);
      return;
    }
    
    // Handle reasoning complete
    if (event.type === 'reasoning_complete') {
      const agent = event.data?.agent || 'MainAgent';
      const bubbleKey = agent;
      if (activeThinkingBubbles[bubbleKey]) {
        finalizeThinkingBubble(activeThinkingBubbles[bubbleKey]);
        delete activeThinkingBubbles[bubbleKey];
      }
      return;

    const msg = event.data.message || '';

    if (msg.includes('⚡ 匹配技能:')) {
      const skill = msg.match(/匹配技能:\s*"(.+)"/)?.[1] || '';
      updateSection('execution', 'active', '匹配技能: ' + skill, '匹配: ' + skill);
    }
    if (msg.includes('⚡ 参数生成完成:')) {
      const params = msg.match(/参数生成完成:\s*(.+)/)?.[1] || '{}';
      updateSection('execution', 'active', '参数: ' + params.substring(0, 100), '参数: ' + params);
    }
    if (msg.includes('⚡ 步骤 2/2: 执行技能脚本')) {
      const execType = msg.match(/执行方式:\s*(.+)/)?.[1] || '执行';
      updateSection('execution', 'active', '步骤 2/2: ' + execType, '执行方式: ' + execType);
    }
    if (msg.includes('⚡ 任务执行成功')) {
      updateSection('execution', 'completed', '任务执行成功', msg);
      updateSection('aggregation', 'active');
    }
    
    // 结果聚合阶段
    if (msg.includes('结果聚合') || msg.includes('聚合')) {
      updateSection('aggregation', 'active', '正在聚合结果...', msg);
    }
    if (msg.includes('聚合完成')) {
      updateSection('aggregation', 'completed', '结果聚合完成');
      updateSection('response', 'active');
    }
  }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const button = document.getElementById('sendButton');
      const text = input.value.trim();
      if (!text || isProcessing) return;

      const welcomeScreen = document.getElementById('welcomeScreen');
      if (welcomeScreen) welcomeScreen.remove();

      addMessage('user', text);
      input.value = '';
      input.style.height = 'auto';
      isProcessing = true;
      button.disabled = true;
      input.disabled = true;
      resetSections();
      showThinking();

      try {
        const response = await fetch(API_BASE_URL + '/tasks/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
          body: JSON.stringify({ requirement: text })
        });
        if (!response.ok) throw new Error('HTTP ' + response.status);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let finalResult = null;
        let hasError = false;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const events = parseSSEvents(buffer);
          const lastDoubleNewline = buffer.lastIndexOf('\n\n');
          if (lastDoubleNewline !== -1) buffer = buffer.slice(lastDoubleNewline + 2);
          for (const event of events) {
            if (event.type === 'step') handleSSEEvent(event);
            else if (event.type === 'complete') finalResult = event.data;
            else if (event.type === 'error') {
              hasError = true;
              hideThinking();
              showError(event.data.message || '处理失败');
            }
          }
        }

        hideThinking();
        if (!hasError) {
          updateSection('response', 'completed', '响应生成完成');
          if (finalResult) showResult(finalResult);
          else addMessage('ai', '处理完成');
        }
      } catch (error) {
        hideThinking();
        showError('请求失败: ' + error.message);
      } finally {
        isProcessing = false;
        button.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      initThinkingSections();
      fetch(API_BASE_URL + '/health').catch(() => showError('无法连接到服务器，请确保服务已启动'));
    });
  </script>
