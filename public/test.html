<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Agent System Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-tertiary: #1a1a25;
      --accent-cyan: #00f5d4;
      --accent-pink: #ff006e;
      --accent-yellow: #fee440;
      --accent-green: #06ffa5;
      --accent-red: #ff3e3e;
      --text-primary: #f0f0f5;
      --text-secondary: #8b8b9e;
      --text-muted: #4a4a5a;
      --border-color: #2a2a3a;
      --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.3);
      --glow-pink: 0 0 20px rgba(255, 0, 110, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 1000;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 48px;
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
    }

    h1 {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 2.5rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    /* API Status */
    .status-bar {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: pulse 2s infinite;
    }

    .status-dot.connected {
      background: var(--accent-green);
      box-shadow: 0 0 10px var(--accent-green);
    }

    .status-dot.error {
      background: var(--accent-red);
      box-shadow: 0 0 10px var(--accent-red);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Sections */
    .section {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 32px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(180deg, var(--accent-cyan), var(--accent-pink));
    }

    .section-title {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::before {
      content: '>';
      color: var(--accent-cyan);
      font-weight: 800;
    }

    /* Form Elements */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
    }

    textarea, input[type="text"] {
      width: 100%;
      padding: 14px 18px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      resize: vertical;
      transition: all 0.3s ease;
    }

    textarea:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--accent-cyan);
      box-shadow: var(--glow-cyan);
    }

    textarea {
      min-height: 120px;
    }

    textarea::placeholder, input::placeholder {
      color: var(--text-muted);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan), #00c9a7);
      color: var(--bg-primary);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--glow-cyan);
    }

    .btn-secondary {
      background: transparent;
      color: var(--accent-cyan);
      border: 1px solid var(--accent-cyan);
    }

    .btn-secondary:hover {
      background: rgba(0, 245, 212, 0.1);
      box-shadow: var(--glow-cyan);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* Tasks List */
    .tasks-container {
      min-height: 200px;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .task-item {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 20px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .task-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--text-muted);
    }

    .task-item.pending::before {
      background: var(--accent-yellow);
    }

    .task-item.running::before {
      background: var(--accent-cyan);
      animation: shimmer 2s infinite;
    }

    .task-item.completed::before {
      background: var(--accent-green);
    }

    .task-item.failed::before {
      background: var(--accent-red);
    }

    @keyframes shimmer {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .task-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
      background: var(--bg-primary);
      padding: 4px 10px;
      border-radius: 4px;
    }

    .task-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-pending {
      background: rgba(254, 228, 64, 0.15);
      color: var(--accent-yellow);
      border: 1px solid var(--accent-yellow);
    }

    .status-running {
      background: rgba(0, 245, 212, 0.15);
      color: var(--accent-cyan);
      border: 1px solid var(--accent-cyan);
    }

    .status-completed {
      background: rgba(6, 255, 165, 0.15);
      color: var(--accent-green);
      border: 1px solid var(--accent-green);
    }

    .status-failed {
      background: rgba(255, 62, 62, 0.15);
      color: var(--accent-red);
      border: 1px solid var(--accent-red);
    }

    .task-requirement {
      color: var(--text-primary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 12px;
      padding: 12px;
      background: var(--bg-primary);
      border-radius: 4px;
      border-left: 3px solid var(--accent-cyan);
    }

    .task-meta {
      display: flex;
      gap: 20px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }

    .task-result {
      margin-top: 16px;
      padding: 16px;
      background: var(--bg-primary);
      border-radius: 4px;
      border: 1px solid var(--border-color);
    }

    .task-result-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent-green);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .task-result-content {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .task-error {
      margin-top: 16px;
      padding: 16px;
      background: rgba(255, 62, 62, 0.1);
      border: 1px solid var(--accent-red);
      border-radius: 4px;
    }

    .task-error-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent-red);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* Error Message */
    .error-message {
      background: rgba(255, 62, 62, 0.1);
      border: 1px solid var(--accent-red);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 20px;
      color: var(--accent-red);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      display: none;
    }

    .error-message.show {
      display: block;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    /* Loading Indicator */
    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }

    .loading.show {
      display: flex;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-color);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Success Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-secondary);
      border: 1px solid var(--accent-green);
      border-radius: 6px;
      padding: 16px 24px;
      color: var(--accent-green);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* Auto-refresh indicator */
    .refresh-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .refresh-indicator.active .refresh-icon {
      animation: spin 1s linear infinite;
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 {
        font-size: 1.8rem;
      }

      .section {
        padding: 24px;
      }

      .task-header {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>MULTI-AGENT SYSTEM</h1>
      <div class="subtitle">Main/Sub Agent Architecture Control Panel</div>
    </header>

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-item">
        <span class="status-dot" id="apiStatusDot"></span>
        <span id="apiStatusText">Checking API...</span>
      </div>
      <div class="status-item">
        <span>Endpoint:</span>
        <span style="color: var(--accent-cyan);">localhost:3000</span>
      </div>
      <div class="status-item refresh-indicator" id="refreshIndicator">
        <span class="refresh-icon">↻</span>
        <span>Auto-refresh: 5s</span>
      </div>
    </div>

    <!-- Submit Task Section -->
    <section class="section">
      <div class="section-title">Submit New Task</div>
      <div class="error-message" id="submitError"></div>
      <div class="form-group">
        <label for="requirement">Requirement / Task Description</label>
        <textarea 
          id="requirement" 
          placeholder="Enter your task requirement... (e.g., 'Calculate 2+2' or 'Summarize the following text...')"
        ></textarea>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="submitBtn" onclick="submitTask()">
          <span>▶</span> Submit Task
        </button>
        <button class="btn btn-secondary" onclick="clearForm()">
          Clear
        </button>
      </div>
    </section>

    <!-- Tasks List Section -->
    <section class="section">
      <div class="section-title">Task Queue</div>
      <div class="btn-group" style="margin-bottom: 20px;">
        <button class="btn btn-secondary" onclick="refreshTasks()">
          <span>↻</span> Refresh Now
        </button>
      </div>
      <div id="submitLoading" class="loading">
        <div class="spinner"></div>
        <span>Submitting task...</span>
      </div>
      <div id="tasksLoading" class="loading">
        <div class="spinner"></div>
        <span>Loading tasks...</span>
      </div>
      <div class="tasks-container" id="tasksContainer">
        <div class="empty-state">
          <div class="empty-state-icon">📋</div>
          <p>No tasks yet. Submit a task to get started.</p>
        </div>
      </div>
    </section>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script>
    // Configuration
    const API_BASE_URL = 'http://localhost:3000';
    const AUTO_REFRESH_INTERVAL = 5000; // 5 seconds

    // State
    let tasks = [];
    let autoRefreshTimer = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      checkApiStatus();
      refreshTasks();
      startAutoRefresh();
    });

    // Check API Status
    async function checkApiStatus() {
      try {
        const response = await fetch(`${API_BASE_URL}/health`, {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });
        
        if (response.ok) {
          const data = await response.json();
          updateStatusDot('connected', 'API Connected');
        } else {
          updateStatusDot('error', 'API Error');
        }
      } catch (error) {
        updateStatusDot('error', 'API Unreachable');
      }
    }

    function updateStatusDot(status, text) {
      const dot = document.getElementById('apiStatusDot');
      const statusText = document.getElementById('apiStatusText');
      
      dot.className = 'status-dot ' + status;
      statusText.textContent = text;
    }

    // Submit Task
    async function submitTask() {
      const requirementInput = document.getElementById('requirement');
      const submitBtn = document.getElementById('submitBtn');
      const submitError = document.getElementById('submitError');
      const submitLoading = document.getElementById('submitLoading');
      
      const requirement = requirementInput.value.trim();
      
      if (!requirement) {
        showError(submitError, 'Please enter a task requirement');
        return;
      }

      // Reset error
      submitError.classList.remove('show');
      submitError.textContent = '';
      
      // Show loading
      submitLoading.classList.add('show');
      submitBtn.disabled = true;

      try {
        const response = await fetch(`${API_BASE_URL}/tasks`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({ requirement })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.message || `HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        
        // Clear form
        requirementInput.value = '';
        
        // Show success toast
        showToast(`Task created: ${data.taskId ? data.taskId.substring(0, 8) + '...' : 'Unknown'}`);
        
        // Refresh tasks
        await refreshTasks();
        
      } catch (error) {
        console.error('Submit error:', error);
        showError(submitError, `Failed to submit task: ${error.message}`);
      } finally {
        submitLoading.classList.remove('show');
        submitBtn.disabled = false;
      }
    }

    // Refresh Tasks
    async function refreshTasks() {
      const container = document.getElementById('tasksContainer');
      const loading = document.getElementById('tasksLoading');
      const indicator = document.getElementById('refreshIndicator');
      
      loading.classList.add('show');
      indicator.classList.add('active');

      try {
        const response = await fetch(`${API_BASE_URL}/tasks`, {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        tasks = data.tasks || [];
        
        // Fetch results for completed/failed tasks
        await fetchTaskResults();
        
        renderTasks();
        
      } catch (error) {
        console.error('Refresh error:', error);
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon" style="color: var(--accent-red);">⚠</div>
            <p style="color: var(--accent-red);">Failed to load tasks: ${error.message}</p>
            <button class="btn btn-secondary" onclick="refreshTasks()" style="margin-top: 16px;">
              Try Again
            </button>
          </div>
        `;
      } finally {
        loading.classList.remove('show');
        indicator.classList.remove('active');
      }
    }

    // Fetch results for completed/failed tasks
    async function fetchTaskResults() {
      const tasksNeedingResults = tasks.filter(task => 
        (task.status === 'completed' || task.status === 'failed') && 
        !task.result && 
        !task.error
      );

      for (const task of tasksNeedingResults) {
        try {
          const response = await fetch(`${API_BASE_URL}/tasks/${task.id}/result`, {
            method: 'GET',
            headers: { 'Accept': 'application/json' }
          });

          if (response.ok) {
            const resultData = await response.json();
            task.resultData = resultData;
          }
        } catch (error) {
          console.error(`Failed to fetch result for task ${task.id}:`, error);
        }
      }
    }

    // Render Tasks
    function renderTasks() {
      const container = document.getElementById('tasksContainer');
      
      if (tasks.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <p>No tasks yet. Submit a task to get started.</p>
          </div>
        `;
        return;
      }

      // Sort by createdAt descending
      const sortedTasks = [...tasks].sort((a, b) => {
        const dateA = a.createdAt ? new Date(a.createdAt) : new Date(0);
        const dateB = b.createdAt ? new Date(b.createdAt) : new Date(0);
        return dateB - dateA;
      });

      const html = sortedTasks.map(task => renderTaskItem(task)).join('');
      container.innerHTML = `<div class="task-list">${html}</div>`;
    }

    function renderTaskItem(task) {
      const statusClass = task.status || 'pending';
      const shortId = task.id ? task.id.substring(0, 8) + '...' : 'Unknown';
      const createdAt = task.createdAt ? formatDate(new Date(task.createdAt)) : 'Unknown';
      
      let resultHtml = '';
      if (task.resultData) {
        if (task.resultData.result !== undefined) {
          resultHtml = `
            <div class="task-result">
              <div class="task-result-title">Result</div>
              <div class="task-result-content">${escapeHtml(JSON.stringify(task.resultData.result, null, 2))}</div>
            </div>
          `;
        } else if (task.resultData.error) {
          resultHtml = `
            <div class="task-error">
              <div class="task-error-title">Error</div>
              <div class="task-result-content" style="color: var(--accent-red);">
                ${escapeHtml(task.resultData.error.message || JSON.stringify(task.resultData.error))}
              </div>
            </div>
          `;
        }
      }

      return `
        <div class="task-item ${statusClass}">
          <div class="task-header">
            <span class="task-id">ID: ${shortId}</span>
            <span class="task-status status-${statusClass}">
              <span>${getStatusIcon(statusClass)}</span>
              ${statusClass}
            </span>
          </div>
          <div class="task-requirement">${escapeHtml(task.requirement || 'No requirement')}</div>
          <div class="task-meta">
            <span>Created: ${createdAt}</span>
            ${task.skillName ? `<span>Skill: ${escapeHtml(task.skillName)}</span>` : ''}
          </div>
          ${resultHtml}
        </div>
      `;
    }

    function getStatusIcon(status) {
      switch (status) {
        case 'pending': return '⏳';
        case 'running': return '▶';
        case 'completed': return '✓';
        case 'failed': return '✕';
        default: return '?';
      }
    }

    function formatDate(date) {
      return date.toLocaleString('en-US', {
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function escapeHtml(text) {
      if (typeof text !== 'string') return text;
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Clear Form
    function clearForm() {
      document.getElementById('requirement').value = '';
      const submitError = document.getElementById('submitError');
      submitError.classList.remove('show');
      submitError.textContent = '';
    }

    // Show Error
    function showError(element, message) {
      element.textContent = message;
      element.classList.add('show');
      setTimeout(() => {
        element.classList.remove('show');
      }, 5000);
    }

    // Show Toast
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // Auto Refresh
    function startAutoRefresh() {
      if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
      }
      autoRefreshTimer = setInterval(() => {
        refreshTasks();
        checkApiStatus();
      }, AUTO_REFRESH_INTERVAL);
    }

    function stopAutoRefresh() {
      if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
      }
    }

    // Handle Enter key in textarea
    document.getElementById('requirement').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
        submitTask();
      }
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      stopAutoRefresh();
    });
  </script>
</body>
</html>
